---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
      - ca-certificates
      - arping
      - cockpit
    state: present

- name: Enable Cockpit
  ansible.builtin.systemd:
    name: cockpit.socket
    enabled: yes
    state: started

# ── Docker ──────────────────────────────────────────────
- name: Check if Docker is installed
  ansible.builtin.command: docker --version
  register: docker_check
  ignore_errors: yes
  changed_when: false

- name: Install Docker via get.docker.com
  ansible.builtin.shell: curl -sSL https://get.docker.com | sh
  args:
    creates: /usr/bin/docker
  when: docker_check.rc != 0

- name: Add car user to docker group
  ansible.builtin.user:
    name: car
    groups: docker
    append: yes

- name: Install Docker Compose plugin
  ansible.builtin.apt:
    name: docker-compose-plugin
    state: present

- name: Configure Docker daemon (insecure registry)
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: Restart Docker

- name: Ensure Docker is running
  ansible.builtin.systemd:
    name: docker
    enabled: yes
    state: started

# Flush now so Docker restarts (if daemon.json changed) before
# role-specific tasks try to pull images.
- name: Flush handlers
  ansible.builtin.meta: flush_handlers

# ── Tailscale ───────────────────────────────────────────
- name: Check if Tailscale is installed
  ansible.builtin.command: tailscale --version
  register: tailscale_check
  ignore_errors: yes
  changed_when: false

- name: Install Tailscale
  ansible.builtin.shell: curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale
  when: tailscale_check.rc != 0

- name: Bring up Tailscale
  ansible.builtin.command: >
    tailscale up
    --accept-routes
    --exit-node={{ tailscale_exit_node }}
    --exit-node-allow-lan-access=true
    --auth-key={{ tailscale_auth_key }}
    --hostname={{ inventory_hostname }}
  register: tailscale_up
  changed_when: "'Success' in tailscale_up.stdout"

# ── Static route for registry subnet ──────────────────
# When on the same LAN as the registry and using a Tailscale exit node,
# traffic to the registry subnet routes via the tunnel instead of the
# local LAN. Detect L2 reachability with arping and add a direct route
# only when the registry is actually on this segment.
- name: Check if registry is on local LAN
  ansible.builtin.command: arping -c 1 -w 2 -I eth0 {{ registry.split(':')[0] }}
  register: registry_arping
  ignore_errors: yes
  changed_when: false

- name: Add static route for registry subnet
  ansible.builtin.command: ip route replace 192.168.50.0/24 dev eth0
  changed_when: false
  when: registry_arping.rc == 0

# ── Compose directory ──────────────────────────────────
- name: Create compose directory
  ansible.builtin.file:
    path: "{{ compose_dir }}"
    state: directory
    owner: car
    group: car
    mode: "0755"
