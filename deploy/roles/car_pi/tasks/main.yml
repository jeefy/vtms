---
# ── WiFi Hotspot ────────────────────────────────────────
- name: Check if hotspot connection exists
  ansible.builtin.command: nmcli connection show Hotspot
  register: hotspot_check
  ignore_errors: yes
  changed_when: false

- name: Create WiFi hotspot
  ansible.builtin.command: >
    nmcli device wifi hotspot
    ssid {{ hotspot_ssid }}
    password {{ hotspot_password }}
    band {{ hotspot_band }}
    channel {{ hotspot_channel }}
  when: hotspot_check.rc != 0
  become: yes

- name: Set hotspot to auto-connect on boot
  ansible.builtin.command: nmcli connection modify Hotspot autoconnect yes
  become: yes
  changed_when: false

- name: Ensure hotspot is active
  ansible.builtin.command: nmcli connection up Hotspot
  become: yes
  register: hotspot_up
  changed_when: "'activated' in hotspot_up.stdout"
  ignore_errors: yes

# ── IP Forwarding ──────────────────────────────────────
- name: Enable IPv4 forwarding (persistent)
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-ip-forward.conf
    reload: yes
    state: present
  become: yes

# ── NAT / iptables ─────────────────────────────────────
- name: Install iptables-persistent
  ansible.builtin.apt:
    name: iptables-persistent
    state: present
  become: yes
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Deploy iptables rules
  ansible.builtin.template:
    src: iptables-restore.j2
    dest: /etc/iptables/rules.v4
    mode: "0644"
  become: yes
  notify: Restore iptables

# ── Docker Compose stack ───────────────────────────────
- name: Copy car-pi docker-compose file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../docker-compose.car-pi.yml"
    dest: "{{ compose_dir }}/docker-compose.yml"
    owner: pi
    group: pi
    mode: "0644"
  become: yes

- name: Pull latest images
  ansible.builtin.command: docker compose pull
  args:
    chdir: "{{ compose_dir }}"
  changed_when: false

- name: Start car-pi services
  ansible.builtin.command: docker compose up -d --remove-orphans
  args:
    chdir: "{{ compose_dir }}"
  changed_when: false
