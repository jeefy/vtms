services:
  vtms-web:
    image: 192.168.50.46:5000/vtms-web:latest
    container_name: vtms-web
    restart: always
    network_mode: host
    volumes:
      - vtms-web-data:/app/server/data
    environment:
      - PORT=3001
      - HOST=0.0.0.0
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  vtms-sdr:
    image: 192.168.50.46:5000/vtms-sdr:latest
    container_name: vtms-sdr
    restart: always
    privileged: true
    network_mode: host
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - vtms-sdr-data:/app/data
    command: ["record", "--freq", "462.5625"]
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 120 --cleanup
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  vtms-web-data:
  vtms-sdr-data:
